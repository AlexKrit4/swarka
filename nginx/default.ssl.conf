upstream web {
    server web:3000;
}

upstream admin {
    server admin:3001;
}

upstream api {
    server api:4000;
}

server {
    listen 80;
    server_name swarka-i-voditel.ru www.swarka-i-voditel.ru admin.swarka-i-voditel.ru api.swarka-i-voditel.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name swarka-i-voditel.ru www.swarka-i-voditel.ru;

    ssl_certificate     /etc/letsencrypt/live/swarka-i-voditel.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/swarka-i-voditel.ru/privkey.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

server {
    listen 443 ssl http2;
    server_name admin.swarka-i-voditel.ru;

    ssl_certificate     /etc/letsencrypt/live/swarka-i-voditel.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/swarka-i-voditel.ru/privkey.pem;

    client_max_body_size 10M;

    location / {
